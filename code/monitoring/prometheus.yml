global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "optionix-monitor"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "optionix-api"
    static_configs:
      - targets: ["app:8000"]
    metrics_path: "/metrics"
    scheme: http

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
